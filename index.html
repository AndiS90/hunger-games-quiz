<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Very Beginner Hunger Games Quiz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pathway+Gothic+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/stylesheet.css">

</head>

<body>
  <nav>
    <h1>Hunger Games Quiz</h1>
    <h2 class="timerline" id="timer"></h2>
  </nav>

  <section class="qbox">
    <h3 class=".questionClass" id="question"></h3>
    <ul class="answersList">
      <li id="ans1"></li>
      <li id="ans2"></li>
      <li id="ans3"></li>
      <li id="ans4"></li>
    </ul>
    <h4 class="validatorClass" id="validator"></h4>
    <button class="startB" id="start">Start</button>
  </section>

  <section class="">
    <h4>High Scores:</h4>
    <ul class="scoresList">
      <li id="score1"></li>
      <li id="score2"></li>
      <li id="score3"></li>
      <li id="score4"></li>
      <li id="score5"></li>
    </ul>
  </section>

  <script src="./assets/js/script.js"></script>

</body>

</html>
